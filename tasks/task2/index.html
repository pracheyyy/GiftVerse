<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .product-card {
            width: 300px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            text-align: center;
            padding: 20px;
        }

        .product-card img {
            width: 100%;
            border-radius: 10px;
        }

        .product-name {
            font-size: 22px;
            margin: 15px 0 10px;
            color: #333;
        }

        .price {
            font-size: 20px;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
             alt="Running Shoes">

        <h2 class="product-name">Running Shoes</h2>

        <p class="price">₹2,999</p>

        <button class="btn">Add to Cart</button>
    </div>

</body>
</html>
