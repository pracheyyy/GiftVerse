<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase - Online Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fa;
}

/* Header */
header{
    background:#1e293b;
    color:white;
    padding:20px;
    text-align:center;
}

header h1{
    margin-bottom:5px;
}

/* Grid Layout */
.container{
    display:grid;
    grid-template-areas:
        "sidebar main"
        "footer footer";
    grid-template-columns:250px 1fr;
    min-height:calc(100vh - 90px);
}

/* Sidebar */
aside{
    grid-area:sidebar;
    background:white;
    padding:20px;
    box-shadow:2px 0 10px rgba(0,0,0,0.1);
}

aside h2{
    margin-bottom:15px;
    color:#333;
}

aside ul{
    list-style:none;
}

aside ul li{
    padding:12px;
    margin-bottom:8px;
    background:#f1f5f9;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

aside ul li:hover{
    background:#2563eb;
    color:white;
}

/* Main Content */
main{
    grid-area:main;
    padding:25px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.card h3{
    margin-bottom:10px;
    color:#333;
}

.price{
    color:#16a34a;
    font-size:20px;
    font-weight:bold;
    margin-bottom:12px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
    transform:scale(1.05);
}

/* Footer */
footer{
    grid-area:footer;
    background:#1e293b;
    color:white;
    text-align:center;
    padding:15px;
}

/* Mobile Responsive */
@media(max-width:768px){

.container{
    grid-template-areas:
        "sidebar"
        "main"
        "footer";
    grid-template-columns:1fr;
}

aside{
    box-shadow:none;
}

.products{
    grid-template-columns:1fr;
}

}
</style>
</head>
<body>

<header>
    <h1>ShopEase</h1>
    <p>Your One-Stop Online Shopping Store</p>
</header>

<div class="container">

    <aside>
        <h2>Categories</h2>
        <ul>
            <li>Electronics</li>
            <li>Fashion</li>
            <li>Footwear</li>
            <li>Accessories</li>
            <li>Home Decor</li>
        </ul>
    </aside>

    <main>
        <h2 style="margin-bottom:20px;">Featured Products</h2>

        <div class="products">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Shoes">
                <div class="card-content">
                    <h3>Running Shoes</h3>
                    <p class="price">₹2,999</p>
                    <button>Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="Watch">
                <div class="card-content">
                    <h3>Smart Watch</h3>
                    <p class="price">₹4,999</p>
                    <button>Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e" alt="Headphones">
                <div class="card-content">
                    <h3>Wireless Headphones</h3>
                    <p class="price">₹3,499</p>
                    <button>Add to Cart</button>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>© 2026 ShopEase. All Rights Reserved.</p>
    </footer>

</div>

</body>
</html>
