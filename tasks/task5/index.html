<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - To Do App</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #667eea 0%,
        #764ba2 100%
    );
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    color:white;
    font-size:2rem;
}

.header p{
    color:#e5e7eb;
    margin-top:5px;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    color:white;
    font-weight:600;
}

.input-section{
    display:flex;
    gap:10px;
    margin-bottom:25px;
}

.input-section input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

.add-btn{
    border:none;
    background:#22c55e;
    color:white;
    padding:15px 22px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

.add-btn:hover{
    transform:translateY(-2px);
    background:#16a34a;
}

ul{
    list-style:none;
}

.task{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:.3s;
}

.task:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 15px rgba(0,0,0,.1);
}

.left{
    display:flex;
    align-items:center;
    gap:12px;
}

.left input{
    width:18px;
    height:18px;
    cursor:pointer;
}

.task-text{
    font-size:16px;
    color:#333;
}

.completed{
    text-decoration:line-through;
    color:#9ca3af;
}

.actions{
    display:flex;
    gap:10px;
}

.actions button{
    border:none;
    width:40px;
    height:40px;
    border-radius:50%;
    cursor:pointer;
    color:white;
    transition:.3s;
}

.edit{
    background:#f59e0b;
}

.delete{
    background:#ef4444;
}

.edit:hover,
.delete:hover{
    transform:scale(1.1);
}

.empty{
    text-align:center;
    color:white;
    padding:20px;
}

@media(max-width:600px){

.input-section{
    flex-direction:column;
}

.add-btn{
    width:100%;
}

.task{
    flex-direction:column;
    gap:15px;
    align-items:flex-start;
}

.actions{
    align-self:flex-end;
}
}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>📝 TaskFlow</h1>
        <p>Manage your daily tasks efficiently</p>
    </div>

    <div class="stats">
        <span>Total Tasks: <span id="total">0</span></span>
        <span>Completed: <span id="completed">0</span></span>
    </div>

    <div class="input-section">
        <input
            type="text"
            id="taskInput"
            placeholder="Enter a new task...">
        <button
            class="add-btn"
            onclick="addTask()">
            <i class="fa-solid fa-plus"></i> Add
        </button>
    </div>

    <ul id="taskList">
        <div class="empty" id="emptyMsg">
            No tasks yet. Add one above 🚀
        </div>
    </ul>

</div>

<script>

const taskInput = document.getElementById("taskInput");
const taskList = document.getElementById("taskList");

function updateStats(){

    const tasks =
    document.querySelectorAll(".task");

    const completed =
    document.querySelectorAll(".completed");

    document.getElementById("total").innerText =
    tasks.length;

    document.getElementById("completed").innerText =
    completed.length;

    document.getElementById("emptyMsg").style.display =
    tasks.length ? "none" : "block";
}

function addTask(){

    const text = taskInput.value.trim();

    if(text === ""){
        alert("Please enter a task.");
        return;
    }

    const li =
    document.createElement("li");

    li.className = "task";

    li.innerHTML = `
        <div class="left">
            <input
            type="checkbox"
            onchange="toggleTask(this)">

            <span class="task-text">
                ${text}
            </span>
        </div>

        <div class="actions">

            <button
            class="edit"
            onclick="editTask(this)">
            <i class="fa-solid fa-pen"></i>
            </button>

            <button
            class="delete"
            onclick="deleteTask(this)">
            <i class="fa-solid fa-trash"></i>
            </button>

        </div>
    `;

    taskList.appendChild(li);

    taskInput.value = "";

    updateStats();
}

function toggleTask(box){

    const text =
    box.parentElement.querySelector(".task-text");

    text.classList.toggle("completed");

    updateStats();
}

function deleteTask(btn){

    btn.closest(".task").remove();

    updateStats();
}

function editTask(btn){

    const textElement =
    btn.closest(".task")
    .querySelector(".task-text");

    const updated =
    prompt(
        "Edit Task",
        textElement.innerText
    );

    if(updated && updated.trim() !== ""){
        textElement.innerText = updated;
    }
}

taskInput.addEventListener(
"keypress",
function(e){
    if(e.key==="Enter"){
        addTask();
    }
});

updateStats();

</script>

</body>
</html>
